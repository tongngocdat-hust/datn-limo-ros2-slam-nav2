slam_gmapping_node:
  ros__parameters:
    base_frame: base_link
    odom_frame: odom
    map_frame: map
    map_update_interval: 2.0

    maxUrange: 12.0
    maxRange: 12.0
    minimumScore: 50.0

    sigma: 0.05
    kernelSize: 1
    lstep: 0.05
    astep: 0.05
    iterations: 5
    lsigma: 0.075
    ogain: 3.0
    lskip: 0

    srr: 0.10
    srt: 0.20
    str: 0.10
    stt: 0.20

    linearUpdate: 0.05
    angularUpdate: 0.10
    temporalUpdate: 0.50
    resampleThreshold: 0.50
    particles: 40

    xmin: -20.0
    ymin: -20.0
    xmax: 20.0
    ymax: 20.0
    delta: 0.05

    llsamplerange: 0.01
    llsamplestep: 0.01
    lasamplerange: 0.005
    lasamplestep: 0.005
